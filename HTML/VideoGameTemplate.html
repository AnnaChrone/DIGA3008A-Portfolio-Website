<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../CSS/style.css">
    <script src="../JS/VideogameTemplate.js" defer></script>
    <script src="../JS/PersistentElements.js" defer></script>
    <title>JC - Engineering Project</title>
</head>
<body id="indiv-videogame-page-body" class="theme-blue-light">
    <nav id="persistent-nav"></nav>
  <main id="videogame-page">

    <a href="Games.html">← Back to Games</a>

    <header>
        <h1 id="game-title"></h1>

        <p id="game-meta"></p>
    </header>

    <section>
        <h2>Game Overview</h2>

        <p id="overview-text"></p>

        <img
            id="overview-image"
            class="hero-image">
    </section>

    <section>
        <h2>My Contribution</h2>

        <p id="contribution-text"></p>

        <div
            id="contribution-images"
            class="image-pair">
        </div>
    </section>

    <section>
        <h2>Process</h2>

        <p id="process-text"></p>

        <div
            id="process-images"
            class="image-pair">
        </div>
    </section>

    <section>
        <h2>Software Used</h2>

        <ul id="software-used"></ul>
    </section>

    <section>
        <h2>Group Members</h2>

        <ul id="group-members"></ul>
    </section>

    <section>
        <h2 id="play-title"></h2>

        <a
            id="github-link"
            target="_blank">
            Github
        </a>

        <a
            id="project-link"
            target="_blank">
            Project
        </a>

        <a
            id="reflection-link"
            target="_blank">
            Reflection
        </a>

</main>

    <section id="contact-me"></section>
